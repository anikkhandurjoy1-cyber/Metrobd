<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetroBD Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase SDKs with explicit async loading -->
<script async src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<style>
:root{
  --primary:#E0007A;--primary2:#FF6B2B;--accent:#0095B6;
  --dark:#FFFFFF;--surface:#F4F6FA;--card:#FFFFFF;--border:#E2E5EC;
  --text:#14141F;--muted:#6B7280;--green:#16A34A;--yellow:#D97706;
  --red:#DC2626;--blue:#2563EB;--purple:#7C3AED;--sw:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter','Hind Siliguri',sans-serif;background:var(--dark);color:var(--text);font-size:14px;}

.init-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px;}
.spinner{width:40px;height:40px;border:4px solid #f0f0f0;border-top:4px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--dark);}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center;}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:900;font-size:20px;color:#fff;transform:rotate(-5deg);}
.logo-text{display:flex;flex-direction:column;line-height:1;text-align:left;}
.logo-metro{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;}
.logo-bd{font-size:10px;color:var(--primary);letter-spacing:3px;font-weight:700;}
.login-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;font-family:'Hind Siliguri';}
.login-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;font-size:14px;outline:none;margin-bottom:14px;}
.login-btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;color:#fff;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none;}
.error-screen{padding:20px;text-align:center;color:var(--red);}
.error-screen h2{margin-bottom:10px;}
.retry-btn{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;margin-top:20px;}
</style>
</head>
<body>

<!-- Initialization Screen -->
<div id="init-screen" class="init-screen">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px;">Initializing Firebase...</div>
</div>

<!-- Login Screen -->
<div id="login-page" class="login-wrap" style="display:none;">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">M</div>
      <div class="logo-text">
        <div class="logo-metro">Metro</div>
        <div class="logo-bd">BD</div>
      </div>
    </div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">লগইন করুন</div>
    <input type="email" id="l-user" class="login-input" placeholder="Email Address">
    <input type="password" id="l-pass" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="doLogin()">🔐 Login</button>
    <div id="login-err" class="login-err">❌ Login failed!</div>
  </div>
</div>

<!-- Error Screen -->
<div id="error-screen" class="init-screen" style="display:none;">
  <div class="error-screen">
    <h2>⚠️ Firebase Error</h2>
    <p id="error-msg">Failed to load Firebase</p>
    <button class="retry-btn" onclick="location.reload()">🔄 Retry</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// WAIT FOR FIREBASE TO LOAD
// ═══════════════════════════════════════════════════════════════

let firebaseReady = false;
let checkInterval;

function checkFirebaseReady() {
  console.log('Checking Firebase...', typeof firebase, typeof firebase?.initializeApp);
  
  if(typeof firebase !== 'undefined' && typeof firebase.initializeApp === 'function') {
    console.log('✅ Firebase SDK loaded!');
    clearInterval(checkInterval);
    firebaseReady = true;
    initializeApp();
    return true;
  }
  return false;
}

// Check every 100ms for 10 seconds
let attempts = 0;
checkInterval = setInterval(() => {
  attempts++;
  if(checkFirebaseReady() || attempts > 100) {
    clearInterval(checkInterval);
    if(attempts > 100) {
      showError('Firebase SDK did not load. Please check your internet connection.');
    }
  }
}, 100);

// Also check on window load event
window.addEventListener('load', () => {
  console.log('Window loaded, checking Firebase...');
  checkFirebaseReady();
});

function initializeApp() {
  try {
    console.log('Initializing Firebase app...');
    
    const firebaseConfig = {
      apiKey: "AIzaSyAxKeYJ44HkX43z1i_VXtud3eT5mfiekLo",
      authDomain: "metrobd-d3c80.firebaseapp.com",
      projectId: "metrobd-d3c80",
      storageBucket: "metrobd-d3c80.firebasestorage.app",
      messagingSenderId: "917963996661",
      appId: "1:917963996661:web:dffe0b1ebe128f56a2f4bc"
    };
    
    firebase.initializeApp(firebaseConfig);
    console.log('✅ Firebase app initialized');
    
    // Get references
    const db = firebase.firestore();
    const auth = firebase.auth();
    window.db = db;
    window.auth = auth;
    console.log('✅ Firestore and Auth ready');
    
    // Hide init screen
    document.getElementById('init-screen').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
    
    // Auth state listener
    auth.onAuthStateChanged(user => {
      if(user) {
        console.log('✅ Logged in:', user.email);
        showSuccess(user.email);
      } else {
        console.log('Not logged in');
      }
    });
    
  } catch(err) {
    console.error('❌ Init error:', err);
    showError('Error: ' + err.message);
  }
}

function doLogin() {
  if(!window.auth) {
    alert('Firebase not ready yet. Please wait...');
    return;
  }
  
  const email = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  const btn = document.querySelector('.login-btn');
  
  if(!email || !pass) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  
  btn.textContent = '⏳ Logging in...';
  btn.disabled = true;
  
  window.auth.signInWithEmailAndPassword(email, pass)
    .then(result => {
      console.log('✅ Login success:', result.user.email);
      document.getElementById('login-page').style.display = 'none';
      showSuccess(result.user.email);
    })
    .catch(err => {
      console.error('❌ Login error:', err.message);
      document.getElementById('login-err').style.display = 'block';
      btn.textContent = '🔐 Login';
      btn.disabled = false;
    });
}

function showSuccess(email) {
  document.getElementById('init-screen').style.display = 'flex';
  document.getElementById('init-screen').innerHTML = `
    <div style="text-align:center;">
      <h2 style="color:var(--green);font-size:32px;margin-bottom:20px;">✅ Success!</h2>
      <p style="color:var(--text);font-size:16px;margin-bottom:20px;">Logged in as: <strong>${email}</strong></p>
      <p style="color:var(--muted);margin-bottom:20px;">Admin panel loading...</p>
      <div class="spinner"></div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('init-screen').style.display = 'none';
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

console.log('=== MetroBD Admin Init Started ===');
console.log('Waiting for Firebase SDK...');
</script>

</body>
</html>
